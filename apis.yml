apis:
- aid: emissary-ingress:emissary-ingress-api
  name: Emissary-Ingress Configuration API
  description: >-
    Emissary-Ingress is configured through Kubernetes custom resources
    including Mapping for routing rules, Host for domain configuration,
    TLSContext for TLS termination, RateLimitService for rate limiting,
    and AuthService for external authentication. These CRDs provide
    declarative API gateway configuration within the Kubernetes ecosystem.

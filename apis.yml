aid: emissary-ingress
name: Emissary-Ingress
description: >-
  Emissary-Ingress is a CNCF incubating Kubernetes-native API gateway
  built on the Envoy proxy. It provides ingress control, load balancing,
  authentication, rate limiting, and traffic management for microservices.
  Emissary-Ingress is configured through Kubernetes custom resources and
  supports canary releases, circuit breaking, and automatic retries.

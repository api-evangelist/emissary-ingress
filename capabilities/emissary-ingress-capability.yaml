naftiko: 1.0.0-alpha2
info:
  label: Emissary-Ingress Configuration API
  description: Emissary-Ingress is a CNCF incubating Kubernetes-native API gateway and ingress controller built on the Envoy
    proxy. It is configured through Kubernetes Custom Resource Definitions (CRDs) including Mapping for request routing, Host
    for domain and TLS management, TLSContext for TLS termination settings, RateLimitService for delegating rate limiting
    to external services, and AuthService for external authentication. All resources are managed through the Kubernetes API
    server using standard CRUD operations.
  tags:
  - Emissary
  - Ingress
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
